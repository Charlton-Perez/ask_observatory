name: Daily observatory data update

on:
  schedule:
    # Run every hour, round the clock. Originally limited to 10:00-15:00 UTC on
    # the assumption the observer always enters data within that window — but
    # ObsCode notes on real rows show entries landing well outside it (and
    # sometimes days late, e.g. during an instrument fault), so a narrow window
    # just adds avoidable latency once new data does appear. This repo is
    # public, so Actions minutes are free — an idle hourly check costs nothing.
    - cron: '0 * * * *'
  workflow_dispatch:   # also allow manual trigger from GitHub Actions UI

# Never let two runs (e.g. an hourly cron and a manual dispatch) push at once —
# overlapping pushes are what produced committed merge-conflict markers in the CSV.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch yesterday's data
        run: python scripts/fetch_ruao.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ruao_data.csv
          # Only commit if there's actually something new
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: update observatory data for $(date -u -d yesterday '+%Y-%m-%d')"
          # Rebase onto any commits landed since checkout, then push — avoids the
          # non-fast-forward races that previously left conflict markers in the CSV.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "::error::could not push after 3 attempts"
          exit 1
